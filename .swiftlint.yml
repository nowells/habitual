included:
  - Habitual/Sources
  - HabitualWatch/Sources
  - HabitualWidgets/Sources
  - HabitualComplications/Sources
  - Tests

excluded:
  - .build
  - .claude

opt_in_rules:
  - empty_count
  - explicit_init
  - first_where
  - force_unwrapping
  - modifier_order
  - sorted_imports
  - toggle_bool
  - unneeded_parentheses_in_closure_argument

disabled_rules:
  - trailing_whitespace  # swift-format handles this

line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 800

function_body_length:
  warning: 60
  error: 100
