included:
  - Habitual/Sources
  - HabitualWatch/Sources
  - HabitualWidgets/Sources
  - HabitualComplications/Sources
  - Tests

excluded:
  - .build
  - .claude

opt_in_rules:
  - empty_count
  - explicit_init
  - first_where
  - force_unwrapping
  - modifier_order
  - sorted_imports
  - toggle_bool
  - unneeded_parentheses_in_closure_argument

disabled_rules:
  - trailing_whitespace  # swift-format handles this
  - opening_brace  # swift-format handles brace placement (conflicts on multi-line conditions)
  - multiple_closures_with_trailing_closure  # conflicts with idiomatic SwiftUI

line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 450
  error: 600

file_length:
  warning: 750
  error: 1000

function_body_length:
  warning: 90
  error: 120

cyclomatic_complexity:
  warning: 15
  error: 20

trailing_comma:
  mandatory_comma: true

large_tuple:
  warning: 3
  error: 5

# Allow short names common in drawing/math code and closures
identifier_name:
  min_length:
    warning: 2
    error: 1
  excluded:
    - id
    - i
    - x
    - y
    - r
    - g
    - b
