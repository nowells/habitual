name: CI — Tests & Visual Regression

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # Allows triggering a run programmatically (e.g. after auto-committing new
  # golden images) so stability can be verified without auto-recording.
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Unit & Integration Tests ─────────────────────────────────────────
  unit-tests:
    name: Unit & Integration Tests
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16.*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          fi
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Resolve dependencies
        run: swift package resolve

      - name: Run unit tests
        run: |
          set -o pipefail
          swift test \
            --filter HabitualTests \
            --parallel \
            2>&1 | tee test-output.txt

      - name: Upload test output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-output
          path: test-output.txt

  # ── Visual Regression (Snapshot) Tests ───────────────────────────────
  snapshot-tests:
    name: Visual Regression Tests
    runs-on: macos-15
    timeout-minutes: 25
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history needed for comparing snapshot diffs
          fetch-depth: 0
          # On PRs, check out the head branch so we can push back to it
          ref: ${{ github.head_ref || github.ref }}

      - name: Install Git LFS
        run: |
          brew install git-lfs
          git lfs install

      - name: Pull LFS objects
        run: git lfs pull

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16.*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          fi
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Resolve dependencies
        run: swift package resolve

      - name: Run snapshot tests (comparison mode)
        id: compare
        continue-on-error: ${{ github.event_name == 'pull_request' }}
        run: |
          set -o pipefail
          swift test \
            --filter HabitualSnapshotTests \
            2>&1 | tee snapshot-test-output.txt

      # ── PR-only: re-record and commit updated golden images ──────────
      - name: Re-record snapshots
        if: github.event_name == 'pull_request' && steps.compare.outcome == 'failure'
        env:
          SNAPSHOT_RECORD: "true"
        run: |
          echo "::notice::Snapshot comparison failed — re-recording golden images…"
          swift test \
            --filter HabitualSnapshotTests \
            2>&1 | tee snapshot-record-output.txt || true

      - name: Commit updated snapshots
        id: commit-snapshots
        if: github.event_name == 'pull_request' && steps.compare.outcome == 'failure'
        run: |
          # Track any new/changed snapshot images (directory may not exist yet)
          if [ -d "Tests/HabitualSnapshotTests/__Snapshots__" ]; then
            find Tests/HabitualSnapshotTests/__Snapshots__ -name "*.png" | head -1 | grep -q . && \
              git add Tests/HabitualSnapshotTests/__Snapshots__/
          fi

          if git diff --cached --quiet; then
            echo "::warning::Snapshot tests failed but no image files changed."
            echo "This likely indicates a test infrastructure issue, not a visual diff."
            exit 1
          fi

          echo "Changed snapshot files:"
          git diff --cached --name-only

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git commit -m "chore: update VRT golden images

          Automatically recorded by CI after snapshot comparison failed.
          Review the image diffs in this PR to verify the visual changes."

          git push
          echo "committed=true" >> $GITHUB_OUTPUT
          echo "::notice::Updated golden images committed. Triggering stability check…"

      # Pushes made with GITHUB_TOKEN/GITEA_TOKEN do not automatically re-trigger
      # workflow runs (by design, to prevent loops). Fire a workflow_dispatch
      # explicitly so the new golden images are verified in compare-only mode.
      # workflow_dispatch events never match 'github.event_name == pull_request'
      # so the re-record steps below will not run — this is inherently loop-safe.
      - name: Trigger stability check on updated snapshots
        if: steps.commit-snapshots.outputs.committed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            "${{ github.api_url }}/repos/${{ github.repository }}/actions/workflows/ci.yml/dispatches" \
            -d "{\"ref\": \"${{ github.head_ref }}\"}")
          if [ "$STATUS" = "204" ] || [ "$STATUS" = "200" ]; then
            echo "::notice::Stability-check CI run dispatched on ${{ github.head_ref }}."
          else
            echo "::warning::Could not dispatch stability check (HTTP $STATUS). Please trigger manually via 'Run workflow' on this branch."
          fi

      - name: Upload snapshot failures
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-failures
          path: |
            Tests/HabitualSnapshotTests/__Snapshots__/
            snapshot-test-output.txt
            snapshot-record-output.txt

  # ── Build Validation ─────────────────────────────────────────────────
  build-check:
    name: Build Check (iOS)
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16.*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          fi
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Install xcpretty
        run: gem install xcpretty

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -project Habitual.xcodeproj \
            -scheme Habitual \
            -destination "platform=iOS Simulator,name=iPhone 16 Pro" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            | xcpretty

  # ── Status Gate ──────────────────────────────────────────────────────
  ci-pass:
    name: CI Pass
    needs: [unit-tests, snapshot-tests, build-check]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.unit-tests.result }}" != "success" ]; then
            echo "Unit tests failed"
            exit 1
          fi
          if [ "${{ needs.snapshot-tests.result }}" != "success" ]; then
            echo "Snapshot tests failed"
            exit 1
          fi
          if [ "${{ needs.build-check.result }}" != "success" ]; then
            echo "Build check failed"
            exit 1
          fi
          echo "All CI checks passed!"
